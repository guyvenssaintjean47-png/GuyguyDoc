<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PastDoc - Convertisseur de documents simple et efficace</title>

    <style>
     
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Segoe UI", "Inter", Arial, sans-serif;
    min-height: 100vh;

    
    background-image: linear-gradient(
        rgba(0, 0, 0, 0.65),
        rgba(0, 0, 0, 0.65)
    ),
    url("image/Backgroung2.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display: flex;
    justify-content: center;
    align-items: center;
}


.container {
    width: 90%;
    max-width: 900px;
    padding: 50px 45px;

    background: rgba(20, 20, 20, 0.75);
    backdrop-filter: blur(8px);

    border-radius: 16px;
    box-shadow: 
        0 20px 40px rgba(0, 0, 0, 0.5),
        inset 0 0 0 1px rgba(255, 255, 255, 0.05);

    text-align: center;
    color: #ffffff;
}


h1 {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 12px;
}


.subtitle {
    font-size: 18px;
    font-weight: 400;
    color: #dcdcdc;
    margin-bottom: 28px;
}


.description {
    font-size: 16px;
    line-height: 1.7;
    color: #f0f0f0;
    max-width: 650px;
    margin: 0 auto 40px auto;
}

.description strong {
    color: #FFB703;
    font-weight: 600;
}



.btn {
    display: inline-block;
    padding: 15px 42px;
    font-size: 18px;
    font-weight: 600;

    color: #1a1a1a; 
    background: linear-gradient(135deg, #FFB703, #F4A261);

    border-radius: 50px;
    text-decoration: none;

    box-shadow: 0 10px 25px rgba(255, 183, 3, 0.45);

    transition: all 0.3s ease;
}


.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 30px rgba(255, 183, 3, 0.65);
    background: linear-gradient(135deg, #F4A261, #E8961E);
}


footer {
    margin-top: 35px;
    font-size: 13px;
    color: #b5b5b5;
}


@media (max-width: 600px) {
    h1 {
        font-size: 36px;
    }

    .subtitle {
        font-size: 16px;
    }

    .description {
        font-size: 15px;
    }

    .container {
        padding: 35px 25px;
    }
}

    </style>
</head>

<body>
    <div class="container">
        <h1>PastDoc</h1>
        <p class="subtitle">Le meuilleur convertisseur de documents en ligne</p>

        <p class="description">
            Convertissez vos fichiers en un clique <strong>Word en PDF</strong>,
            <strong>PDF en Word</strong> et <strong>PDF en Excel</strong>.
            <br>
            La conversion de fichiers n’a jamais été aussi rapide, simple et sécurisée.
        </p>

        <a href="accueille.jsp" class="btn">Commencer l'aventure</a>

        <footer>
            © 2026 PastDoc – Tous droits réservés
        </footer>
    </div>
</body>
</html>
